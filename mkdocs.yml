site_name: ir-torch
repo_url: https://github.com/jacobdanovitch/ir-torch
site_url: https://jacobdanovitch.github.io/ir-torch
site_description: This is a template repository for Python projects that use uv for their dependency management.
site_author: Jacob Danovitch
edit_uri: edit/main/docs/
repo_name: jacobdanovitch/ir-torch
copyright: Maintained by <a href="https://jacobdanovitch.com">jacobdanovitch</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/ir_torch"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jacobdanovitch/ir-torch
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ir-torch

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
